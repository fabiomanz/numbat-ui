[package]
name = "numbat-ui"
version = "1.1.0"
description = "A native GUI for the Numbat scientific calculator."
authors = ["Fabio Manz"]
edition = "2021"

[dependencies]
eframe = "0.29"
egui = "0.29"
env_logger = "0.11"
log = "0.4"
numbat = "1.23.0"
anyhow = "1"
colored = "2"
itertools = "0.14"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_System_Console", "Win32_Foundation"] }
