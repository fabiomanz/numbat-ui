name: Release
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_name: numbat-ui-macos-universal
          - platform: ubuntu-latest
            targets: x86_64-unknown-linux-gnu
            artifact_name: numbat-ui-linux-x86_64
          - platform: windows-latest
            targets: x86_64-pc-windows-msvc
            artifact_name: numbat-ui-windows-x86_64.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libglib2.0-dev libgtk-3-dev

      - name: Build the app
        if: matrix.platform != 'macos-latest'
        run: cargo build --release --target ${{ matrix.targets }}

      - name: Build the app (macOS Universal)
        if: matrix.platform == 'macos-latest'
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Prepare Artifact (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          mv target/${{ matrix.targets }}/release/numbat-ui ${{ matrix.artifact_name }}

      - name: Prepare Artifact (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cargo install cargo-bundle
          # Bundle using aarch64 to get the .app structure
          cargo bundle --release --target aarch64-apple-darwin
          # Replace the binary with a universal one via lipo
          lipo -create \
            target/aarch64-apple-darwin/release/numbat-ui \
            target/x86_64-apple-darwin/release/numbat-ui \
            -output "target/aarch64-apple-darwin/release/bundle/osx/Numbat.app/Contents/MacOS/numbat-ui"
          cd "target/aarch64-apple-darwin/release/bundle/osx"
          zip -r "../../../../../${{ matrix.artifact_name }}.zip" "Numbat.app"

      - name: Prepare Artifact (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mv target/${{ matrix.targets }}/release/numbat-ui.exe ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ matrix.artifact_name }}*

      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        if: matrix.platform == 'macos-latest' && !contains(github.ref, '-')
        with:
          formula-name: numbat-ui
          formula-path: Casks/numbat-ui.rb
          homebrew-tap: ${{ github.repository_owner }}/homebrew-tools
          base-branch: main
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/numbat-ui-macos-universal.zip
          commit-message: "Update numbat-ui formula to {{version}}"
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
